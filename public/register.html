<!DOCTYPE html>
<html lang='uk'>

<head>
  <meta charset='UTF-8'>
  <title>Реєстрація</title>
</head>

<body>
  <h1>Реєстрація</h1>
  <form id='registerForm'>
    <input type='text' id='name' placeholder="Ім'я" required>
    <input type='email' id='email' placeholder='Email' required>
    <input type='password' id='password' placeholder='Пароль' required>
    <input type='password' id='confirmPassword' placeholder='Підтвердіть пароль' required>
    <button type='submit'>Зареєструватися</button>
  </form>
  <p id='message'></p>
  <script>

    const API_URL = 'http://127.0.0.1:3000';

    document.getElementById('registerForm')
      .addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          confirmPassword: document.getElementById('confirmPassword').value
        };
        const response = await fetch(`${API_URL}/api/auth/register`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await response.json();
        if (!response.ok) {
          document.getElementById('message').textContent = data.message;
          return;
        }
        document.getElementById('message').textContent = 'Реєстрація успішна!';
        setTimeout(() => window.location.href = window.location.href.replace('register.html', 'index.html'), 1000);
      });
  </script>
</body>

</html>
