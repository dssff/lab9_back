<!DOCTYPE html>
<html lang='uk'>

<head>
	<meta charset='UTF-8'>
	<title>todo-task-system</title>
</head>

<body>

	<h1>Задачі</h1>

	<a href='./login.html'>Увійти</a> |
	<a href='./register.html'>Реєстрація</a> |
	<a href='./create.html'>Додати завдання</a>

	<button id='logoutBtn'>Вийти</button>

	<ul id='taskList'></ul>

	<script>

		const API_URL = 'http://127.0.0.1:3000';

		async function loadTasks() {

			const response = await fetch(`${API_URL}/api/tasks`, {
				credentials: 'include'
			});

			const data = await response.json();

			const list = document.getElementById('taskList');

			if (!response.ok) {
				list.innerHTML = `<li>${data.message || 'Помилка'}</li>`;
				return;
			}

			const tasks = data.data || data;

			list.innerHTML = tasks.map(t =>
				`<li>
            <h3>${t.title}</h3>
            <p>${t.description}</p>
            <small>${t.priority} — ${t.status}</small>
        </li>`
			).join('');
		}

		document.getElementById('logoutBtn')
			.addEventListener('click', async () => {

				await fetch(`${API_URL}/api/auth/logout`, {
					method: 'POST',
					credentials: 'include'
				});

				window.location.href = './login.html';
			});

		loadTasks();

	</script>

</body>

</html>
